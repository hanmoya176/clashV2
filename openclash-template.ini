[custom]
; ============================================
; OpenClash 订阅转换模板 - 强化补漏版
; 目标：减少漏网域名，增强敏感服务覆盖，保持国内直连不经过 OpenClash
; ============================================

; ---------- 规则集 ----------
ruleset=🎯 国内直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=🎯 国内直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list
ruleset=🎯 国内直连,[]GEOIP,CN
ruleset=🎯 国内直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=🎯 国内直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/MI.list

; Apple 拆分
ruleset=🍎 Apple 国内,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list
ruleset=🍎 Apple 海外,https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/apple.yaml

; 微软 / Cloudflare
ruleset=🔷 微软,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Microsoft.list
ruleset=☁️ Cloudflare直连,https://gist.githubusercontent.com/hanmoya176/b09a89cc43e603b933344d45a6a3289a/raw/cloudflare.list

; 流媒体
ruleset=🎬 Netflix,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Netflix.list
ruleset=🎬 Disney+,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/DisneyPlus.list
ruleset=🎬 YouTube,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTube.list
ruleset=🎬 HBO,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/HBO.list
ruleset=🎬 Amazon,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Amazon.list
ruleset=🎵 Spotify,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Spotify/Spotify.yaml
ruleset=📱 TikTok,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/TikTok.list

; AI 服务
ruleset=🤖 ChatGPT,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.yaml
ruleset=🤖 Claude,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Claude/Claude.yaml
ruleset=🤖 Gemini,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Gemini.list

; 社交 / 其他
ruleset=✈️ Telegram,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Telegram.list
ruleset=🔍 Google,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Google.list
ruleset=🐙 Github,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Github.list
ruleset=🐦 X,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Twitter/Twitter.yaml
ruleset=🎮 Steam,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Steam.list
ruleset=🧩 Discord,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Discord.list
ruleset=🧵 Reddit,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Reddit.list
ruleset=📣 Facebook,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Facebook.list
ruleset=📸 Instagram,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Instagram.list

; 兜底
ruleset=🚀 节点选择,[]FINAL

; ---------- 代理组 ----------
custom_proxy_group=🚀 节点选择`select`[]♾️ 自动选择`.*
custom_proxy_group=♾️ 自动选择`url-test`.*`http://www.google.com/generate_204`3600,,70

; 国内
custom_proxy_group=🎯 国内直连`select`[]DIRECT`[]🚀 节点选择

; Apple
custom_proxy_group=🍎 Apple 国内`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🍎 Apple 海外`select`[]🚀 节点选择`[]♾️ 自动选择`.*

; 微软 / Cloudflare
custom_proxy_group=🔷 微软`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=☁️ Cloudflare直连`select`[]DIRECT`[]🚀 节点选择

; 流媒体
custom_proxy_group=🎬 Netflix`select`[]🚀 节点选择`[]♾️ 自动选择`.*
custom_proxy_group=🎬 Disney+`select`[]🚀 节点选择`[]♾️ 自动选择`.*
custom_proxy_group=🎬 YouTube`select`[]🚀 节点选择`[]♾️ 自动选择`.*
custom_proxy_group=🎬 HBO`select`[]🚀 节点选择`[]♾️ 自动选择`.*
custom_proxy_group=🎬 Amazon`select`[]🚀 节点选择`[]♾️ 自动选择`.*
custom_proxy_group=🎵 Spotify`select`[]🚀 节点选择`[]♾️ 自动选择`.*
custom_proxy_group=📱 TikTok`select`[]🚀 节点选择`[]♾️ 自动选择`.*

; AI
custom_proxy_group=🤖 ChatGPT`select`[]🚀 节点选择`[]♾️ 自动选择`.*
custom_proxy_group=🤖 Claude`select`[]🚀 节点选择`[]♾️ 自动选择`.*
custom_proxy_group=🤖 Gemini`select`[]🚀 节点选择`[]♾️ 自动选择`.*

; 社交 / 其他
custom_proxy_group=✈️ Telegram`select`[]🚀 节点选择`[]♾️ 自动选择`.*
custom_proxy_group=🐦 X`select`[]🚀 节点选择`[]♾️ 自动选择`.*
custom_proxy_group=📸 Instagram`select`[]🚀 节点选择`[]♾️ 自动选择`.*
custom_proxy_group=📣 Facebook`select`[]🚀 节点选择`[]♾️ 自动选择`.*
custom_proxy_group=🧵 Reddit`select`[]🚀 节点选择`[]♾️ 自动选择`.*
custom_proxy_group=🧩 Discord`select`[]🚀 节点选择`[]♾️ 自动选择`.*
custom_proxy_group=🔍 Google`select`[]🚀 节点选择`[]♾️ 自动选择`.*
custom_proxy_group=🐙 Github`select`[]🚀 节点选择`[]♾️ 自动选择`.*
custom_proxy_group=🎮 Steam`select`[]🚀 节点选择`[]♾️ 自动选择`.*

enable_rule_generator=true

